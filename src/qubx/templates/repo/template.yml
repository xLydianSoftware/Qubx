name: "repo"
description: "Full strategy repository with CI, tests, justfile, and project tooling"
version: "1.0.0"
author: "Qubx Framework"
parameters:
  - name: "strategy_name"
    description: "Name of the strategy (used as package name)"
    required: true
  - name: "strategy_class"
    description: "Strategy class name (PascalCase)"
    required: true
  - name: "description"
    description: "Short project description"
    default: ""
  - name: "author_name"
    description: "Author full name"
    default: ""
  - name: "author_email"
    description: "Author email"
    default: ""
  - name: "exchange"
    description: "Exchange to trade on"
    default: "BINANCE.UM"
  - name: "symbols"
    description: "List of symbols to trade"
    default: ["BTCUSDT"]
  - name: "timeframe"
    description: "Timeframe for data"
    default: "1h"
