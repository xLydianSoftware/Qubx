name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - stable
          - rc
          - dev

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate next version
        id: version
        run: |
          set -e

          BUMP_TYPE="${{ inputs.bump_type }}"
          CHANNEL="${{ inputs.channel }}"

          # Get latest stable tag (ignore rc/dev tags)
          LATEST_STABLE=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v 'rc\|dev' | sort -V | tail -n1 || echo "v0.0.0")
          echo "Latest stable tag: $LATEST_STABLE"

          # Parse version components
          VERSION=${LATEST_STABLE#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Apply bump
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Base version after bump: $BASE_VERSION"

          # Determine final version based on channel
          case $CHANNEL in
            stable)
              NEXT_VERSION="$BASE_VERSION"
              TAG="v${NEXT_VERSION}"
              PRERELEASE=false
              ;;
            rc)
              # Find highest existing rcN for this base version
              EXISTING_RC=$(git tag -l "v${BASE_VERSION}rc*" | grep -oP 'rc\K[0-9]+' | sort -n | tail -n1 || echo "0")
              NEXT_RC=$((EXISTING_RC + 1))
              NEXT_VERSION="${BASE_VERSION}rc${NEXT_RC}"
              TAG="v${NEXT_VERSION}"
              PRERELEASE=true
              echo "Existing RC count: $EXISTING_RC, next: $NEXT_RC"
              ;;
            dev)
              # Find highest existing devN for this base version
              EXISTING_DEV=$(git tag -l "v${BASE_VERSION}.dev*" | grep -oP '\.dev\K[0-9]+' | sort -n | tail -n1 || echo "0")
              NEXT_DEV=$((EXISTING_DEV + 1))
              NEXT_VERSION="${BASE_VERSION}.dev${NEXT_DEV}"
              TAG="v${NEXT_VERSION}"
              PRERELEASE=true
              echo "Existing dev count: $EXISTING_DEV, next: $NEXT_DEV"
              ;;
          esac

          echo "Next version: $NEXT_VERSION"
          echo "Tag: $TAG"
          echo "Prerelease: $PRERELEASE"

          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        id: release_notes
        run: |
          # Generate changelog for this release
          NOTES=$(git-cliff --unreleased --strip header 2>/dev/null || echo "No conventional commits found since last release.")

          # Handle empty notes
          if [ -z "$NOTES" ] || [ "$NOTES" = "No conventional commits found since last release." ]; then
            NOTES="Release ${{ steps.version.outputs.version }}"
          fi

          # Save to file for multi-line handling
          echo "$NOTES" > release_notes.md
          echo "Generated release notes"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "$TAG" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "$TAG"

          echo "Created and pushed tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Channel:** ${{ inputs.channel }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump Type:** ${{ inputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Prerelease:** ${{ steps.version.outputs.prerelease }}" >> $GITHUB_STEP_SUMMARY
